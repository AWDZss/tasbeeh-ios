<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>الدعم الفني لتطبيق سبحتي الذكية</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f4ee;
        --ink: #10201d;
        --muted: #5f716c;
        --primary: #123b35;
        --primary-light: #1f6b5f;
        --surface: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(160deg, #f7f4ee 0%, #e8f0ec 100%);
        color: var(--ink);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 640px);
        background: var(--surface);
        border-radius: 22px;
        box-shadow: 0 22px 60px rgba(18, 59, 53, 0.14);
        padding: 32px 24px;
        text-align: center;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(1.8rem, 7vw, 2.6rem);
        line-height: 1.25;
      }

      p {
        margin: 0 auto;
        color: var(--muted);
        font-size: 1.06rem;
        line-height: 1.9;
        max-width: 520px;
      }

      .email-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        margin-top: 26px;
        padding: 0 22px;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--primary), var(--primary-light));
        color: #ffffff;
        font-weight: 800;
        text-decoration: none;
        box-shadow: 0 16px 32px rgba(18, 59, 53, 0.22);
      }

      footer {
        margin-top: 28px;
        color: var(--muted);
        font-size: 0.94rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>الدعم الفني لتطبيق سبحتي الذكية</h1>
      <p>
        مرحبًا بك في صفحة الدعم الفني لتطبيق سبحتي الذكية.
        إذا واجهتك أي مشكلة في التطبيق أو كان لديك اقتراح، يمكنك التواصل معنا عبر البريد الإلكتروني.
      </p>
      <a class="email-button" href="mailto:ibzzzib1@gmail.com">تواصل عبر البريد الإلكتروني</a>
      <footer>© 2026 Ibrahim Ahmed</footer>
    </main>
  </body>
</html>
