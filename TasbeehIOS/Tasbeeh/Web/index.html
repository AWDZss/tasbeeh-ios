<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#123b35" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="تسبيح" />
    <title>تطبيق تسبيح</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-label="تطبيق تسبيح">
      <section class="topbar">
        <div>
          <p class="eyebrow">ذكر اليوم</p>
          <h1>تسبيح</h1>
        </div>
        <button class="icon-button" id="soundToggle" type="button" aria-label="تشغيل الاهتزاز">
          <span aria-hidden="true">♪</span>
        </button>
      </section>

      <section class="dhikr-panel" aria-live="polite">
        <button class="chip-nav" id="prevDhikr" type="button" aria-label="الذكر السابق">‹</button>
        <div class="dhikr-copy">
          <p class="dhikr-title" id="dhikrTitle">سبحان الله</p>
          <p class="dhikr-subtitle" id="dhikrSubtitle">املأ وقتك بذكر خفيف على اللسان</p>
        </div>
        <button class="chip-nav" id="nextDhikr" type="button" aria-label="الذكر التالي">›</button>
      </section>

      <section class="counter-card">
        <div class="progress-ring" aria-hidden="true">
          <svg viewBox="0 0 220 220">
            <circle class="ring-bg" cx="110" cy="110" r="98"></circle>
            <circle class="ring-fill" id="ringFill" cx="110" cy="110" r="98"></circle>
          </svg>
          <div class="counter-readout">
            <span class="count" id="count">0</span>
            <span class="target" id="targetLabel">من 33</span>
          </div>
        </div>

        <button class="tap-button" id="tapButton" type="button">
          اضغط للتسبيح
        </button>

        <div class="actions">
          <button class="secondary-button" id="resetButton" type="button">تصفير</button>
          <button class="secondary-button" id="undoButton" type="button">تراجع</button>
        </div>
      </section>

      <section class="targets" aria-label="اختيار الهدف">
        <button class="target-pill is-active" type="button" data-target="33">33</button>
        <button class="target-pill" type="button" data-target="99">99</button>
        <button class="target-pill" type="button" data-target="100">100</button>
        <button class="target-pill" type="button" data-target="1000">1000</button>
      </section>

      <section class="stats">
        <div>
          <span class="stat-label">جلسات اليوم</span>
          <strong id="sessionsToday">0</strong>
        </div>
        <div>
          <span class="stat-label">إجمالي التسبيح</span>
          <strong id="totalCount">0</strong>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
